# baseline.yaml — default config for baseline.py

workers: 5
runs: 3

verifiers:
  - type: execution
    multi_run: true

  - type: equivamap
    multi_run: true
    client:
      model: claude-opus-4-7
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high

  - type: flare
    harness: opencode
    client:
      model: claude-opus-4-7
      effort: medium
