# ablation.yaml — default config for ablation.py.

workers: 25
runs: 3

modes:
  - label: regular
    template: flare_nl
    include_implicit: true
  - label: no_definition
    template: no_definition.j2
    include_implicit: true
  - label: allow_implicit
    template: flare_nl
    include_implicit: false

models:
  - label: opus-4.7
    client:
      model: claude-opus-4-7
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high

  - label: gpt-4.1 # no reasoning support
    client: { model: gpt-4.1, max_tokens: 8192 }

  - label: gpt-5.5
    client:
      model: gpt-5.5
      max_tokens: 16384
      reasoning: true
      reasoning_effort: medium

  - label: deepseek-pro
    client:
      model: deepseek-v4-pro
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high
