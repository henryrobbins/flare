# experiment1.yaml — default config for experiment1.py.
#
# Runs the three baseline reformulation checkers on every pair: deterministic
# solver-based execution, EquivaMap (LLM-driven variable mapping + structural
# check), and FLARE (Lean-proof agent).

workers: 5

checkers:
  - type: execution

  - type: equivamap
    client:
      model: gpt-4.1
      max_tokens: 4096

  - type: flare
    model: claude-opus-4-7
