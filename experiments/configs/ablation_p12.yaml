# ablation_p12.yaml — full model sweep restricted to problem 12.

workers: 25
runs: 3
problems: [12]

modes:
  - label: regular
    template: reformulation.j2
    include_implicit: true
  - label: no_definition
    template: no_definition.j2
    include_implicit: true
  - label: allow_implicit
    template: reformulation.j2
    include_implicit: false

models:
  # == Anthropic models =======================================================

  - label: opus-4-7
    client: { model: claude-opus-4-7, max_tokens: 8192 }
  - label: opus-4.7_reasoning
    client:
      model: claude-opus-4-7
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high

  - label: sonnet-4-6
    client: { model: claude-sonnet-4-6, max_tokens: 8192 }
  - label: sonnet-4-6_reasoning
    client:
      model: claude-sonnet-4-6
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high

  # == OpenAI models ==========================================================

  - label: gpt-4.1 # no reasoning support
    client: { model: gpt-4.1, max_tokens: 8192 }

  - label: gpt-5.5
    client: { model: gpt-5.5, max_tokens: 8192 }
  - label: gpt-5.5_reasoning
    client:
      model: gpt-5.5
      max_tokens: 16384
      reasoning: true
      reasoning_effort: medium

  - label: gpt-5.4
    client: { model: gpt-5.4, max_tokens: 8192 }
  - label: gpt-5.4_reasoning
    client:
      model: gpt-5.4
      max_tokens: 16384
      reasoning: true
      reasoning_effort: medium

  # == DeepSeek models ========================================================

  - label: deepseek-pro
    client: { model: deepseek-v4-pro, max_tokens: 8192 }
  - label: deepseek-pro_reasoning
    client:
      model: deepseek-v4-pro
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high

  - label: deepseek-flash
    client: { model: deepseek-v4-flash, max_tokens: 8192 }
  - label: deepseek-flash_reasoning
    client:
      model: deepseek-v4-flash
      max_tokens: 16384
      reasoning: true
      reasoning_effort: high
