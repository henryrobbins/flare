# baseline_flare.yaml — FLARE only.

workers: 5
runs: 1

verifiers:
  - type: flare
    name: flare-claude-code-opus-4-7
    harness: claude_code
    client:
      model: claude-opus-4-7
      effort: high

  - type: flare
    name: flare-codex-gpt-5.5
    harness: codex
    client:
      model: gpt-5.5
      effort: medium

  - type: flare
    name: flare-opencode-deepseek-pro
    harness: opencode
    client:
      model: deepseek-v4-pro
      effort: high
