[project]
name = "equiva-proof"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "anthropic",
    "gurobipy",
    "jinja2",
    "matplotlib>=3.10.9",
    "milp-eq-tools",
    "openai",
    "pandas>=2.3.3",
    "python-dotenv>=1.2.2",
    "tqdm",
    "tsplib95",
]

[tool.uv]
sources = { milp-eq-tools = { path = "python", editable = true } }
dev-dependencies = [
    "mypy>=1.0",
    "ruff>=0.4",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
strict = true
files = ["dataset", "scripts", "src"]
