name: Release dataset

on:
  push:
    tags:
      - "dataset-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. dataset-v0.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dataset tarball
        run: |
          mkdir -p dist
          git archive --format=tar --prefix=dataset/ "HEAD:dataset" \
            | gzip -9 > dist/dataset.tar.gz
          sha256sum dist/dataset.tar.gz | tee dist/dataset.tar.gz.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA=$(awk '{print $1}' dist/dataset.tar.gz.sha256)
          gh release create "$TAG" \
            dist/dataset.tar.gz dist/dataset.tar.gz.sha256 \
            --title "$TAG" \
            --notes "Dataset snapshot at $(git rev-parse --short HEAD).

          sha256: \`$SHA\`"
