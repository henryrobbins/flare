name: Release milp-flare

on:
  push:
    tags:
      - "milp-flare-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. milp-flare-v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        run: git checkout "${{ steps.tag.outputs.tag }}"

      - uses: astral-sh/setup-uv@v5

      - name: Build distributions
        working-directory: packages/milp_flare
        run: uv build

      - name: Publish to PyPI
        working-directory: packages/milp_flare
        run: uv publish --token "${{ secrets.PYPI_API_TOKEN_MILP_FLARE }}"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHORT=$(git rev-parse --short "$TAG^{commit}")
          MSG=$(git tag -l --format='%(contents:body)' "$TAG")
          {
            echo "$MSG"
            echo
            echo "milp-flare release at $SHORT."
          } > dist-notes.md
          VERSION="${TAG#milp-flare-v}"
          PRERELEASE=()
          if [[ "${VERSION%%.*}" == "0" ]]; then
            PRERELEASE=(--prerelease)
          fi
          gh release create "$TAG" \
            packages/milp_flare/dist/* \
            --title "$TAG" \
            --notes-file dist-notes.md \
            "${PRERELEASE[@]}"
