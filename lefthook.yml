pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.py"
      run: uv run ruff check {staged_files}
    format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
    typecheck:
      glob: "*.py"
      run: uv run mypy
    typecheck-formulation-bench:
      glob: "*.py"
      root: packages/formulation_bench
      run: uv run mypy
    typecheck-milp-flare:
      glob: "*.py"
      root: packages/milp_flare
      run: uv run mypy
